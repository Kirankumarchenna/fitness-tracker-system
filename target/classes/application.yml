spring:
  application:
    name: fitness-tracker-system
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true
  datasource:
    url: jdbc:h2:mem:fitnesstracker
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
server:
  port: 8080
  servlet:
    context-path:

#JWT configuration
jwt:
  secret: mySecretKeyForJWTAuthenticationThatIsLongerThan32Characters!@#
  expiration: 8600000

#logging
logging:
  level:
      root: INFO
      com.kiran.fitnesstracker: DEBUG
      org.springframework.security: DEBUG

# Swagger/OpenAPI
springdoc:
   api-docs:
     path: /v3/api-docs
     swagger-ui:
      path: /swagger-ui.html
      enabled: true

